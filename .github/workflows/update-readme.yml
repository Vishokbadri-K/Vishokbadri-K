name: Daily README Update

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true  # important for push

    - name: Set up Git
      run: |
        git config user.name "Vishokbadri-K"
        git config user.email "vishokbadri1913@gmail.com"

    - name: Update README timestamp
      run: |
        sed -i "s/Last updated: .*/Last updated: $(date '+%Y-%m-%d %H:%M:%S')/" README.md

    - name: Commit changes
      run: |
        git add README.md
        git diff --cached --quiet || git commit -m "chore: auto-update README timestamp [skip ci]"

    - name: Push changes
      run: |
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Vishokbadri-K/Vishokbadri-K.git
        git push