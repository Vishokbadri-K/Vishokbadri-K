name: Daily README Update

on:
  schedule:
    - cron: '0 */12 * * *'  # every 12 hours
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true  # ensures git push uses token

    - name: Set up Git
      run: |
        git config user.name "Vishokbadri-K"
        git config user.email "vishokbadri1913@gmail.com"

    - name: Update README timestamp
      run: |
        # Replace 'Last updated' line
        sed -i "s/Last updated: .*/Last updated: $(date '+%d-%m-%Y %H:%M:%S')/" README.md

    - name: Commit changes
      run: |
        git add README.md
        git diff --cached --quiet || git commit -m "chore: auto-update README timestamp [skip ci]"

    - name: Push changes
      run: git push