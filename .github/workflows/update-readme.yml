name: Daily README Update

on:
  schedule:
    - cron: '0 */12 * * *' # every 12 hours
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set Git user
        run: |
          git config user.name "Vishokbadri-K"
          git config user.email "Vishokbadri-K@users.noreply.github.com"

      - name: Update README timestamp
        run: |
          sed -i "s/Last updated: .*/Last updated: $(date '+%d-%m-%Y %H:%M:%S')/" README.md

      - name: Commit changes
        run: |
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update README timestamp [skip ci]"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/Vishokbadri-K/Vishokbadri-K.git HEAD:main